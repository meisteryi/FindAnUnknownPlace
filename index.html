<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unseen Map - Explorer</title>

    <!-- 전 세계 1위 안정성을 자랑하는 Leaflet.js 라이브러리 -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- exifr (h3-js 격자 라이브러리 제거) -->
    <script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/lite.umd.js"></script>

    <!-- CSS, JS 파일 연결 -->
    <link rel="stylesheet" href="./styles.css" />
    <script src="./app.js" defer></script>
  </head>
  <body>
    <div id="map"></div>

    <div id="ui-panel">
      <h1 style="margin: 0; font-size: 22px; color: #111">🌍 Unseen Map</h1>
      <div style="font-size: 14px; color: #555">
        여러 장의 사진을 올려 발자취를 남겨보세요!
      </div>

      <label class="upload-btn" id="upload-label">
        📸 사진 업로드 (여러 장 가능)
        <input
          type="file"
          id="file-upload"
          accept="image/jpeg, image/png, image/heic"
          multiple
          style="display: none"
        />
      </label>

      <!-- 빠른 이동 버튼 (한국 & 일본) -->
      <div class="city-section">
        <div style="font-size: 14px; font-weight: bold; color: #333">
          🇰🇷 한국 대도시
        </div>
        <div class="button-group">
          <button class="city-btn" onclick="moveToCity(37.5665, 126.978, 11)">
            서울
          </button>
          <button class="city-btn" onclick="moveToCity(35.1796, 129.0756, 11)">
            부산
          </button>
          <button class="city-btn" onclick="moveToCity(33.4996, 126.5312, 11)">
            제주
          </button>
          <button class="city-btn" onclick="moveToCity(36.3504, 127.3845, 11)">
            대전
          </button>
        </div>

        <div
          style="
            font-size: 14px;
            font-weight: bold;
            color: #333;
            margin-top: 8px;
          "
        >
          🇯🇵 일본 대도시
        </div>
        <div class="button-group">
          <button class="city-btn" onclick="moveToCity(35.6895, 139.6917, 11)">
            도쿄
          </button>
          <button class="city-btn" onclick="moveToCity(34.6937, 135.5023, 11)">
            오사카
          </button>
          <button class="city-btn" onclick="moveToCity(33.5902, 130.4017, 11)">
            후쿠오카
          </button>
          <button class="city-btn" onclick="moveToCity(43.0618, 141.3545, 11)">
            삿포로
          </button>
        </div>
      </div>

      <!-- 히스토리 버튼 추가 -->
      <button
        id="toggle-history"
        class="city-btn"
        style="
          background-color: #28a745;
          color: white;
          border: none;
          padding: 10px;
          font-weight: bold;
          font-size: 14px;
          margin-top: 10px;
        "
      >
        📜 방문 히스토리 보기
      </button>
    </div>

    <!-- 히스토리 패널 -->
    <div id="history-panel" class="hidden">
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 16px;
          padding-bottom: 10px;
          border-bottom: 2px solid #eee;
        "
      >
        <h2 style="margin: 0; font-size: 18px">방문 히스토리</h2>
        <div>
          <button
            id="clear-all-history"
            style="
              background: #dc3545;
              color: white;
              border: none;
              padding: 6px 10px;
              border-radius: 4px;
              font-size: 12px;
              cursor: pointer;
              margin-right: 8px;
            "
          >
            전체 삭제
          </button>
          <button
            id="close-history"
            style="
              background: none;
              border: none;
              font-size: 24px;
              cursor: pointer;
              color: #555;
            "
          >
            &times;
          </button>
        </div>
      </div>
      <div id="history-list"></div>
    </div>

    <!-- 토스트 메시지 -->
    <div id="toast-message"></div>

    <!-- 개발용 초기화 버튼 -->
    <button
      id="dev-reset-btn"
      style="
        position: fixed;
        bottom: 20px;
        left: 20px;
        z-index: 9999;
        background: #ff4444;
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 4px;
        font-size: 12px;
        cursor: pointer;
        opacity: 0.8;
        transition: opacity 0.2s;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
      "
      onmouseover="this.style.opacity = '1'"
      onmouseout="this.style.opacity = '0.8'"
    >
      🛠️ 개발용 초기화
    </button>
  </body>
</html>
