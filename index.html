<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unseen Map</title>

    <!-- 완전 무료 오픈소스인 MapLibre GL JS 라이브러리 및 CSS (CDN) -->
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link
      href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css"
      rel="stylesheet"
    />

    <!-- 위치 계산 및 EXIF 추출 라이브러리 추가 (가장 안정적인 UMD 방식) -->
    <script src="https://unpkg.com/h3-js@4.1.0/dist/h3-js.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/lite.umd.js"></script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #000;
        font-family: sans-serif;
      }
      #map {
        width: 100vw;
        height: 100vh;
        position: relative;
      }

      #ui-panel {
        position: absolute;
        top: 20px;
        left: 20px;
        background-color: rgba(0, 0, 0, 0.75);
        color: white;
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        z-index: 10;
        display: flex;
        flex-direction: column;
        gap: 16px;
        min-width: 250px;
        backdrop-filter: blur(4px);
      }

      .upload-btn {
        background-color: #333;
        padding: 10px;
        border-radius: 6px;
        cursor: pointer;
        text-align: center;
        font-size: 14px;
        border: 1px solid #555;
      }
    </style>
  </head>
  <body>
    <!-- 지도 컨테이너 -->
    <div id="map"></div>

    <!-- UI 패널 -->
    <div id="ui-panel">
      <h1 style="margin: 0; font-size: 20px; color: #fced4a">Unseen Map</h1>
      <div style="font-size: 16px; font-weight: bold">
        방문한 격자 수 :
        <span id="hexagon-count" style="color: #fced4a">0</span> 개
      </div>
      <label class="upload-btn">
        사진 업로드 (위치 탐색)
        <input
          type="file"
          id="file-upload"
          accept="image/jpeg, image/png, image/heic"
          style="display: none"
        />
      </label>
      <p style="margin: 0; font-size: 12px; color: #aaa; line-height: 1.4">
        * 사진은 서버로 전송되지 않고<br />기기 내부에서만 안전하게 분석됩니다.
      </p>
    </div>

    <!-- 메인 스크립트 -->
    <script>
      // 위에서 불러온 h3 전역 객체에서 함수 추출
      const { latLngToCell, cellToBoundary } = h3;

      // 지도 초기화 (토큰 불필요)
      const map = new maplibregl.Map({
        container: 'map',
        // CartoDB에서 공식적으로 제공하는 완전 무료 다크 모드 벡터(Vector) 스타일
        style:
          'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
        center: [139.715, 35.72],
        zoom: 13,
      });

      // 상태 관리 변수
      const visitedHexagons = new Set();
      const geoJsonData = {
        type: 'FeatureCollection',
        features: [],
      };

      map.on('load', () => {
        map.addSource('hexagons', { type: 'geojson', data: geoJsonData });
        map.addLayer({
          id: 'hexagons-layer',
          type: 'fill',
          source: 'hexagons',
          paint: {
            'fill-color': '#fced4a',
            'fill-opacity': 0.6,
            'fill-outline-color': '#fced4a',
          },
        });
      });

      // 파일 업로드 이벤트 핸들러
      document
        .getElementById('file-upload')
        .addEventListener('change', async (event) => {
          const file = event.target.files[0];
          if (!file) return;

          try {
            const gpsData = await exifr.gps(file);
            if (!gpsData || !gpsData.latitude || !gpsData.longitude) {
              alert('위치 정보가 없는 사진입니다.');
              event.target.value = '';
              return;
            }

            const { latitude, longitude } = gpsData;
            const hexId = latLngToCell(latitude, longitude, 10);

            if (visitedHexagons.has(hexId)) {
              event.target.value = '';
              return;
            }

            const boundary = cellToBoundary(hexId);
            const coordinates = boundary.map((coord) => [coord[1], coord[0]]);
            coordinates.push(coordinates[0]); // 다각형 닫기

            visitedHexagons.add(hexId);
            geoJsonData.features.push({
              type: 'Feature',
              geometry: { type: 'Polygon', coordinates: [coordinates] },
            });

            document.getElementById('hexagon-count').innerText =
              visitedHexagons.size;
            map.getSource('hexagons').setData(geoJsonData);
            map.flyTo({
              center: [longitude, latitude],
              zoom: 14,
              essential: true,
              speed: 1.2,
            });
          } catch (error) {
            alert('사진 분석 중 오류가 발생했습니다.');
          }
          event.target.value = ''; // 초기화
        });
    </script>
  </body>
</html>
