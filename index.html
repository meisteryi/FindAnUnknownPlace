<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unseen Map - Explorer</title>

    <!-- 전 세계 1위 안정성을 자랑하는 Leaflet.js 라이브러리 -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- exifr (h3-js 격자 라이브러리 제거) -->
    <script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/lite.umd.js"></script>

    <!-- 장소 검색(지오코딩) 플러그인 추가 -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"
    />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <!-- CSS, JS 파일 연결 -->
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./ui.css" />
    <link rel="stylesheet" href="./history.css" />
    <link rel="stylesheet" href="./mobile.css" />
    <script src="./app.js" defer></script>
    <script src="./upload.js" defer></script>
    <script src="./history.js" defer></script>
    <script src="./mobile-drag.js" defer></script>
    <script src="./ui.js" defer></script>
  </head>
  <body>
    <div id="map"></div>

    <div id="ui-panel">
      <!-- 드래그 핸들 추가 -->
      <div id="drag-handle" class="drag-handle-wrapper">
        <div class="drag-handle"></div>
      </div>

      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
        "
      >
        <h1 style="margin: 0; font-size: 22px; color: #111">
          🌍 Your Trip History
        </h1>
        <button id="minimize-panel-btn" class="pc-only-btn" title="패널 숨기기">
          ◀ 접기
        </button>
      </div>
      <div style="font-size: 14px; color: #555">
        여행 중에 찍은 사진을 업로드해 발자취를 남겨보세요!
      </div>

      <label class="upload-btn" id="upload-label">
        📸 사진 업로드 (여러 장 가능)
        <input
          type="file"
          id="file-upload"
          accept="image/jpeg, image/png, image/heic"
          multiple
          style="display: none"
        />
      </label>

      <button class="location-btn" id="current-location-btn">
        📍 현재 내 위치로 이동
      </button>

      <!-- 빠른 이동 버튼 (한국 & 일본) -->
      <div class="city-section">
        <div class="city-region-title">🇰🇷 한국</div>

        <div class="city-sub-title">수도권/강원</div>
        <div class="button-group">
          <button class="city-btn" onclick="moveToCity(37.5665, 126.978, 11)">
            서울
          </button>
          <button class="city-btn" onclick="moveToCity(37.2636, 127.0286, 11)">
            수원
          </button>
          <button class="city-btn" onclick="moveToCity(37.4563, 126.7052, 11)">
            인천
          </button>
          <button class="city-btn" onclick="moveToCity(37.7518, 128.876, 11)">
            강릉
          </button>
          <button class="city-btn" onclick="moveToCity(38.0754, 128.619, 11)">
            양양
          </button>
        </div>

        <div class="city-sub-title">충청/경상</div>
        <div class="button-group">
          <button class="city-btn" onclick="moveToCity(36.3504, 127.3845, 11)">
            대전
          </button>
          <button class="city-btn" onclick="moveToCity(35.1796, 129.0756, 11)">
            부산
          </button>
          <button class="city-btn" onclick="moveToCity(35.8714, 128.6014, 11)">
            대구
          </button>
          <button class="city-btn" onclick="moveToCity(35.8562, 129.2247, 11)">
            경주
          </button>
        </div>

        <div class="city-sub-title">전라/제주</div>
        <div class="button-group">
          <button class="city-btn" onclick="moveToCity(35.1595, 126.8526, 11)">
            광주
          </button>
          <button class="city-btn" onclick="moveToCity(35.8242, 127.148, 11)">
            전주
          </button>
          <button class="city-btn" onclick="moveToCity(33.4996, 126.5312, 11)">
            제주
          </button>
        </div>

        <div class="city-region-title mt">🇯🇵 일본</div>

        <div class="city-sub-title">간토/홋카이도</div>
        <div class="button-group">
          <button class="city-btn" onclick="moveToCity(35.6895, 139.6917, 11)">
            도쿄
          </button>
          <button class="city-btn" onclick="moveToCity(35.4437, 139.638, 11)">
            요코하마
          </button>
          <button class="city-btn" onclick="moveToCity(43.0618, 141.3545, 11)">
            삿포로
          </button>
          <button class="city-btn" onclick="moveToCity(41.7687, 140.7288, 11)">
            하코다테
          </button>
        </div>

        <div class="city-sub-title">간사이/도카이</div>
        <div class="button-group">
          <button class="city-btn" onclick="moveToCity(34.6937, 135.5023, 11)">
            오사카
          </button>
          <button class="city-btn" onclick="moveToCity(35.0116, 135.7681, 11)">
            교토
          </button>
          <button class="city-btn" onclick="moveToCity(35.1815, 136.9066, 11)">
            나고야
          </button>
          <button class="city-btn" onclick="moveToCity(34.9756, 138.3828, 11)">
            시즈오카
          </button>
        </div>

        <div class="city-sub-title">규슈/시코쿠/기타</div>
        <div class="button-group">
          <button class="city-btn" onclick="moveToCity(33.5902, 130.4017, 11)">
            후쿠오카
          </button>
          <button class="city-btn" onclick="moveToCity(34.3401, 134.0433, 11)">
            다카마쓰
          </button>
          <button class="city-btn" onclick="moveToCity(34.3853, 132.4553, 11)">
            히로시마
          </button>
          <button class="city-btn" onclick="moveToCity(26.2124, 127.6809, 11)">
            오키나와
          </button>
        </div>
      </div>

      <!-- 히스토리 버튼 추가 -->
      <button id="toggle-history" class="city-btn">
        📜 방문 히스토리 보기
      </button>
    </div>

    <!-- 히스토리 패널 -->
    <div id="history-panel" class="hidden">
      <div class="history-header">
        <h2 style="margin: 0; font-size: 18px">방문 히스토리</h2>
        <div>
          <button id="clear-all-history">전체 삭제</button>
          <button id="close-history">&times;</button>
        </div>
      </div>
      <div id="history-list"></div>
    </div>

    <!-- 토스트 메시지 -->
    <div id="toast-message"></div>

    <!-- 모바일 진행 상황 오버레이 -->
    <div id="mobile-progress-overlay"></div>

    <!-- 개발용 초기화 버튼 -->
    <button id="dev-reset-btn">🛠️ 개발용 초기화</button>

    <!-- 패널 열기 버튼 (PC 전용, 숨겨져 있을 때만 보임) -->
    <button
      id="restore-panel-btn"
      class="pc-only-btn hidden-btn"
      title="패널 열기"
    >
      ▶ 열기
    </button>
  </body>
</html>
