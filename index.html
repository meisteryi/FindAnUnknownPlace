<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unseen Map - Explorer</title>

    <!-- 전 세계 1위 안정성을 자랑하는 Leaflet.js 라이브러리 -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- exifr (h3-js 격자 라이브러리 제거) -->
    <script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/lite.umd.js"></script>

    <!-- 장소 검색(지오코딩) 플러그인 추가 -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"
    />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <!-- Leaflet MarkerCluster 플러그인 추가 -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"
    />
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

    <!-- CSS, JS 파일 연결 -->
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./ui.css" />
    <link rel="stylesheet" href="./history.css" />
    <link rel="stylesheet" href="./mobile.css" />
    <script src="./app.js" defer></script>
    <script src="./navigation.js" defer></script>
    <script src="./recommend.js" defer></script>
    <script src="./auth.js" defer></script>
    <script src="./upload.js" defer></script>
    <script src="./history.js" defer></script>
    <script src="./mobile-drag.js" defer></script>
    <script src="./ui.js" defer></script>
  </head>
  <body>
    <div id="map"></div>

    <div id="ui-panel">
      <!-- 드래그 핸들 추가 -->
      <div id="drag-handle" class="drag-handle-wrapper">
        <div class="drag-handle"></div>
      </div>

      <!-- ==== 1. 기본 화면 ==== -->
      <div id="default-view" class="view-content">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
          "
        >
          <h1 style="margin: 0; font-size: 22px; color: #111">
            🌍 Your Trip History
          </h1>
        </div>
        <div style="font-size: 14px; color: #555">
          여행 중에 찍은 사진을 업로드해 발자취를 남겨보세요!
        </div>

        <!-- 메인 액션 버튼 그룹 -->
        <div class="main-actions">
          <label class="upload-btn" id="upload-label">
            📸 사진 업로드 (여러 장 가능)
            <input
              type="file"
              id="file-upload"
              accept="image/jpeg, image/png, image/heic"
              multiple
              style="display: none"
            />
          </label>

          <button class="location-btn" id="current-location-btn">
            📍 현재 내 위치로 이동
          </button>

          <button
            class="recommend-btn"
            id="recommend-btn"
            onclick="toggleRecommendMode()"
          >
            🧭 미개척지 골목 탐색
          </button>

          <button id="toggle-history">📜 방문 히스토리 보기</button>
        </div>

        <!-- 빠른 이동 버튼 (한국 & 일본) -->
        <div class="city-section">
          <div class="city-region-title">🇰🇷 한국</div>
          <div class="city-sub-title">수도권/강원</div>
          <div class="button-group">
            <button
              class="city-btn"
              onclick="toggleSubCity('seoul-sub', 37.5665, 126.978, 11)"
            >
              서울
            </button>
            <button
              class="city-btn"
              onclick="moveToCity(37.2636, 127.0286, 11)"
            >
              수원
            </button>
            <button
              class="city-btn"
              onclick="moveToCity(37.4563, 126.7052, 11)"
            >
              인천
            </button>
            <button class="city-btn" onclick="moveToCity(37.7518, 128.876, 11)">
              강릉
            </button>
            <button class="city-btn" onclick="moveToCity(38.0754, 128.619, 11)">
              양양
            </button>
          </div>

          <!-- 서울 하위 카테고리 -->
          <div id="seoul-sub" class="sub-button-group">
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(37.4979, 127.0276, 14)"
            >
              강남
            </button>
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(37.5568, 126.9245, 14)"
            >
              홍대
            </button>
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(37.5636, 126.9827, 14)"
            >
              명동
            </button>
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(37.5446, 127.056, 14)"
            >
              성수
            </button>
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(37.5216, 126.9242, 14)"
            >
              여의도
            </button>
          </div>

          <div class="city-sub-title">충청/경상</div>
          <div class="button-group">
            <button
              class="city-btn"
              onclick="moveToCity(36.3504, 127.3845, 11)"
            >
              대전
            </button>
            <button
              class="city-btn"
              onclick="toggleSubCity('busan-sub', 35.1796, 129.0756, 11)"
            >
              부산
            </button>
            <button
              class="city-btn"
              onclick="moveToCity(35.8714, 128.6014, 11)"
            >
              대구
            </button>
            <button
              class="city-btn"
              onclick="moveToCity(35.8562, 129.2247, 11)"
            >
              경주
            </button>
          </div>

          <!-- 부산 하위 카테고리 -->
          <div id="busan-sub" class="sub-button-group">
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(35.1587, 129.1604, 14)"
            >
              해운대
            </button>
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(35.1532, 129.1189, 14)"
            >
              광안리
            </button>
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(35.153, 129.0596, 14)"
            >
              서면
            </button>
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(35.0975, 129.0286, 14)"
            >
              남포동
            </button>
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(35.074, 129.0682, 14)"
            >
              영도
            </button>
          </div>

          <div class="city-sub-title">전라/제주</div>
          <div class="button-group">
            <button
              class="city-btn"
              onclick="moveToCity(35.1595, 126.8526, 11)"
            >
              광주
            </button>
            <button class="city-btn" onclick="moveToCity(35.8242, 127.148, 11)">
              전주
            </button>
            <button
              class="city-btn"
              onclick="toggleSubCity('jeju-sub', 33.4996, 126.5312, 11)"
            >
              제주
            </button>
          </div>

          <!-- 제주 하위 카테고리 -->
          <div id="jeju-sub" class="sub-button-group">
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(33.5104, 126.5215, 13)"
            >
              제주시
            </button>
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(33.253, 126.5594, 13)"
            >
              서귀포
            </button>
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(33.4623, 126.3197, 13)"
            >
              애월
            </button>
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(33.4621, 126.9363, 13)"
            >
              성산
            </button>
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(33.2505, 126.4132, 13)"
            >
              중문
            </button>
          </div>

          <div class="city-region-title mt">🇯🇵 일본</div>
          <div class="city-sub-title">간토/홋카이도</div>
          <div class="button-group">
            <button
              class="city-btn"
              onclick="toggleSubCity('tokyo-sub', 35.6895, 139.6917, 11)"
            >
              도쿄
            </button>
            <button class="city-btn" onclick="moveToCity(35.4437, 139.638, 11)">
              요코하마
            </button>
            <button
              class="city-btn"
              onclick="moveToCity(43.0618, 141.3545, 11)"
            >
              삿포로
            </button>
            <button
              class="city-btn"
              onclick="moveToCity(41.7687, 140.7288, 11)"
            >
              하코다테
            </button>
          </div>

          <!-- 도쿄 하위 카테고리 -->
          <div id="tokyo-sub" class="sub-button-group">
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(35.6938, 139.7034, 14)"
            >
              신주쿠
            </button>
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(35.658, 139.7016, 14)"
            >
              시부야
            </button>
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(35.7295, 139.7109, 14)"
            >
              이케부쿠로
            </button>
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(35.6712, 139.7663, 14)"
            >
              긴자
            </button>
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(35.6983, 139.7731, 14)"
            >
              아키하바라
            </button>
          </div>

          <div class="city-sub-title">간사이/도카이</div>
          <div class="button-group">
            <button
              class="city-btn"
              onclick="toggleSubCity('osaka-sub', 34.6937, 135.5023, 11)"
            >
              오사카
            </button>
            <button
              class="city-btn"
              onclick="toggleSubCity('kyoto-sub', 35.0116, 135.7681, 11)"
            >
              교토
            </button>
            <button
              class="city-btn"
              onclick="moveToCity(35.1815, 136.9066, 11)"
            >
              나고야
            </button>
            <button
              class="city-btn"
              onclick="moveToCity(34.9756, 138.3828, 11)"
            >
              시즈오카
            </button>
          </div>

          <!-- 오사카 하위 카테고리 -->
          <div id="osaka-sub" class="sub-button-group">
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(34.7024, 135.4959, 14)"
            >
              우메다
            </button>
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(34.6666, 135.5, 14)"
            >
              난바
            </button>
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(34.6476, 135.514, 14)"
            >
              덴노지
            </button>
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(34.6654, 135.4323, 14)"
            >
              USJ
            </button>
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(34.6873, 135.5262, 14)"
            >
              오사카성
            </button>
          </div>

          <!-- 교토 하위 카테고리 -->
          <div id="kyoto-sub" class="sub-button-group">
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(34.9858, 135.7587, 14)"
            >
              교토역
            </button>
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(35.0036, 135.7731, 14)"
            >
              기온
            </button>
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(34.9948, 135.785, 14)"
            >
              청수사
            </button>
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(35.0093, 135.6775, 14)"
            >
              아라시야마
            </button>
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(34.9671, 135.7726, 14)"
            >
              후시미이나리
            </button>
          </div>

          <div class="city-sub-title">규슈/시코쿠/기타</div>
          <div class="button-group">
            <button
              class="city-btn"
              onclick="toggleSubCity('fukuoka-sub', 33.5902, 130.4017, 11)"
            >
              후쿠오카
            </button>
            <button
              class="city-btn"
              onclick="moveToCity(34.3401, 134.0433, 11)"
            >
              다카마쓰
            </button>
            <button
              class="city-btn"
              onclick="moveToCity(34.3853, 132.4553, 11)"
            >
              히로시마
            </button>
            <button
              class="city-btn"
              onclick="moveToCity(26.2124, 127.6809, 11)"
            >
              오키나와
            </button>
          </div>

          <!-- 후쿠오카 하위 카테고리 -->
          <div id="fukuoka-sub" class="sub-button-group">
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(33.59, 130.4206, 14)"
            >
              하카타
            </button>
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(33.5915, 130.3986, 14)"
            >
              텐진
            </button>
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(33.5932, 130.4045, 14)"
            >
              나카스
            </button>
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(33.5215, 130.5246, 14)"
            >
              다자이후
            </button>
            <button
              class="city-btn sub-btn"
              onclick="moveToSubCity(33.5936, 130.354, 14)"
            >
              모모치
            </button>
          </div>
        </div>
      </div>

      <!-- ==== 2. 미개척지 탐색 모드 화면 (기본 숨김) ==== -->
      <div id="recommend-view" class="view-content view-hidden">
        <h2 style="margin: 0 0 10px 0; font-size: 20px; color: #4b0082">
          🧭 미개척지 탐색
        </h2>
        <div
          style="
            font-size: 13px;
            color: #555;
            margin-bottom: 16px;
            line-height: 1.4;
          "
        >
          방문했던 기록 주변의 새로운 골목을 탐색합니다. 찾고 싶은 장소를
          선택하세요.
        </div>

        <div class="category-filters">
          <label class="filter-label"
            ><input type="checkbox" class="poi-filter" value="restaurant" /> 🍽️
            레스토랑</label
          >
          <label class="filter-label"
            ><input type="checkbox" class="poi-filter" value="cafe" /> ☕
            카페</label
          >
          <label class="filter-label"
            ><input type="checkbox" class="poi-filter" value="bakery" /> 🥐
            베이커리</label
          >
          <label class="filter-label"
            ><input type="checkbox" class="poi-filter" value="bar" /> 🍻
            술집/바</label
          >
          <label class="filter-label"
            ><input type="checkbox" class="poi-filter" value="park" /> 🌳
            공원/휴식</label
          >
          <label class="filter-label"
            ><input type="checkbox" class="poi-filter" value="culture" /> 🎨
            문화/예술</label
          >
          <label class="filter-label"
            ><input type="checkbox" class="poi-filter" value="shop" /> 🛍️
            상점</label
          >
          <label class="filter-label"
            ><input type="checkbox" class="poi-filter" value="mall" /> 🏬
            쇼핑몰</label
          >
          <label class="filter-label"
            ><input type="checkbox" class="poi-filter" value="supermarket" /> 🛒
            마트</label
          >
          <label class="filter-label"
            ><input type="checkbox" class="poi-filter" value="convenience" /> 🏪
            편의점</label
          >
        </div>

        <button
          class="recommend-btn"
          style="margin-top: 16px"
          onclick="startRecommendSearch()"
        >
          🔍 미개척지 탐색 시작
        </button>
        <button
          class="city-btn"
          style="
            margin-top: 10px;
            width: 100%;
            border-radius: 24px;
            padding: 12px;
            font-weight: bold;
            font-size: 15px;
          "
          onclick="toggleRecommendMode()"
        >
          ❌ 탐색 모드 종료
        </button>
      </div>
    </div>

    <!-- PC 전용 서랍 손잡이 (패널 밖으로 빼내어 잘림 현상 방지) -->
    <button id="panel-toggle-btn" class="pc-only-btn" title="패널 숨기기">
      ◀
    </button>

    <!-- 히스토리 패널 -->
    <div id="history-panel" class="hidden">
      <div class="history-header">
        <h2 style="margin: 0; font-size: 18px">방문 히스토리</h2>
        <div style="display: flex; gap: 6px; align-items: center">
          <button
            id="backup-history"
            class="header-btn backup-btn"
            title="데이터 내보내기(백업)"
          >
            💾
          </button>
          <label
            class="header-btn restore-btn"
            title="데이터 불러오기(복원)"
            style="cursor: pointer; margin: 0"
          >
            📂
            <input
              type="file"
              id="restore-history"
              accept=".json"
              style="display: none"
            />
          </label>
          <button id="clear-all-history" class="header-btn clear-btn">
            전체 삭제
          </button>
          <button id="close-history">&times;</button>
        </div>
      </div>
      <div id="history-list"></div>
    </div>

    <!-- 토스트 메시지 -->
    <div id="toast-message"></div>

    <!-- 모바일 진행 상황 오버레이 -->
    <div id="mobile-progress-overlay"></div>

    <!-- 개발용 초기화 버튼 -->
    <button id="dev-reset-btn">🛠️ 개발용 초기화</button>
  </body>
</html>
