<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unseen Map - Explorer</title>

    <!-- 전 세계 1위 안정성을 자랑하는 Leaflet.js 라이브러리 -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- exifr (h3-js 격자 라이브러리 제거) -->
    <script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/lite.umd.js"></script>

    <!-- CSS, JS 파일 연결 -->
    <link rel="stylesheet" href="./styles.css" />
    <script src="./app.js" defer></script>
  </head>
  <body>
    <div id="map"></div>

    <div id="ui-panel">
      <h1 style="margin: 0; font-size: 22px; color: #111">🌍 Unseen Map</h1>
      <div style="font-size: 14px; color: #555">
        여러 장의 사진을 올려 발자취를 남겨보세요!
      </div>

      <label class="upload-btn">
        📸 사진 업로드 (여러 장 가능)
        <input
          type="file"
          id="file-upload"
          accept="image/jpeg, image/png, image/heic"
          multiple
          style="display: none"
        />
      </label>

      <!-- 빠른 이동 버튼 (한국 & 일본) -->
      <div class="city-section">
        <div style="font-size: 14px; font-weight: bold; color: #333">
          🇰🇷 한국 대도시
        </div>
        <div class="button-group">
          <button class="city-btn" onclick="moveToCity(37.5665, 126.978, 11)">
            서울
          </button>
          <button class="city-btn" onclick="moveToCity(35.1796, 129.0756, 11)">
            부산
          </button>
          <button class="city-btn" onclick="moveToCity(33.4996, 126.5312, 11)">
            제주
          </button>
          <button class="city-btn" onclick="moveToCity(36.3504, 127.3845, 11)">
            대전
          </button>
        </div>

        <div
          style="
            font-size: 14px;
            font-weight: bold;
            color: #333;
            margin-top: 8px;
          "
        >
          🇯🇵 일본 대도시
        </div>
        <div class="button-group">
          <button class="city-btn" onclick="moveToCity(35.6895, 139.6917, 11)">
            도쿄
          </button>
          <button class="city-btn" onclick="moveToCity(34.6937, 135.5023, 11)">
            오사카
          </button>
          <button class="city-btn" onclick="moveToCity(33.5902, 130.4017, 11)">
            후쿠오카
          </button>
          <button class="city-btn" onclick="moveToCity(43.0618, 141.3545, 11)">
            삿포로
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
